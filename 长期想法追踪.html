<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>长期想法 - 数字生命</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            color: #fff;
            line-height: 1.7;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 80px 32px;
        }

        .back-link {
            display: inline-block;
            font-size: 0.75rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.4);
            text-decoration: none;
            margin-bottom: 60px;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: rgba(255,255,255,0.7);
        }

        .page-header {
            margin-bottom: 60px;
        }

        .page-number {
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.3);
            margin-bottom: 24px;
        }

        .page-title {
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 300;
            letter-spacing: -0.02em;
            margin-bottom: 16px;
        }

        .page-subtitle {
            font-size: 1rem;
            color: rgba(255,255,255,0.4);
            font-weight: 300;
        }

        .hint {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.35);
            padding: 20px 24px;
            background: rgba(255,255,255,0.02);
            margin-bottom: 60px;
            border-left: 1px solid rgba(255,255,255,0.08);
        }

        .project-card {
            margin-bottom: 48px;
            padding: 40px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.04);
        }

        .project-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 20px;
        }

        .project-title {
            font-size: 1.4rem;
            font-weight: 400;
            letter-spacing: -0.01em;
        }

        .status-badge {
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.4);
        }

        .project-goal {
            font-size: 0.95rem;
            color: rgba(255,255,255,0.6);
            font-weight: 300;
            margin-bottom: 32px;
        }

        .process-section {
            padding-top: 32px;
            border-top: 1px solid rgba(255,255,255,0.04);
        }

        .process-label {
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.3);
            margin-bottom: 24px;
        }

        .process-item {
            margin-bottom: 24px;
            padding-left: 24px;
            border-left: 1px solid rgba(255,255,255,0.06);
        }

        .process-date {
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.3);
            margin-bottom: 12px;
        }

        .process-content {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.55);
            font-weight: 300;
            margin-bottom: 8px;
        }

        .process-meta {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.4);
            font-weight: 300;
        }

        .next-step {
            margin-top: 24px;
            padding: 16px 20px;
            background: rgba(255,255,255,0.02);
            font-size: 0.85rem;
            color: rgba(255,255,255,0.5);
            font-weight: 300;
        }

        footer {
            margin-top: 80px;
            padding-top: 40px;
            border-top: 1px solid rgba(255,255,255,0.05);
            font-size: 0.75rem;
            color: rgba(255,255,255,0.25);
            letter-spacing: 0.05em;
        }

        @media (max-width: 640px) {
            .container { padding: 60px 20px; }
            .project-card { padding: 24px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← 返回</a>
        
        <div class="page-header">
            <div class="page-number">02</div>
            <h1 class="page-title">长期想法</h1>
            <p class="page-subtitle">在探索中的方向，记录过程直到找到答案</p>
        </div>

        <div class="hint">
            记录想做、尝试过一些方法、但还没达成预期效果的事。重点是「过程」——尝试了什么、效果如何、学到了什么。
        </div>

        <div class="project-card">
            <div class="project-header">
                <span class="project-title">心理学漫画卡片</span>
                <span class="status-badge">暂停</span>
            </div>
            <div class="project-goal">
                把暂停实验室课程核心知识点做成扑克牌大小的卡片，可打印随身携带
            </div>

            <div class="process-section">
                <div class="process-label">尝试记录</div>
                
                <div class="process-item">
                    <div class="process-date">2026-04-09 · 第一次尝试</div>
                    <div class="process-content">从课程提炼25张md卡片，用 image_generate 生成图片</div>
                    <div class="process-meta"><strong>结果：</strong>图片生成效果不满意，AI味儿太重，猫咪元素过多</div>
                    <div class="process-meta"><strong>学到：</strong>需要更精准的prompt，或者换其他生成方案</div>
                </div>
            </div>

            <div class="next-step">
                <strong>下一步：</strong>调整图片风格prompt，或尝试其他图片生成工具/方案
            </div>
        </div>

        <footer>最后更新：2026年4月9日</footer>
    </div>
</body>
</html>
