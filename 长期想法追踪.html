<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>长期想法 - bbsqq</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #fafafa;
            color: #333;
            line-height: 1.6;
            padding: 60px 24px;
        }
        .container { max-width: 680px; margin: 0 auto; }
        header { margin-bottom: 48px; }
        .back {
            font-size: 0.85rem;
            color: #888;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 16px;
        }
        .back:hover { color: #333; }
        .title {
            font-size: 1.75rem;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }
        .subtitle {
            font-size: 0.95rem;
            color: #666;
        }
        .hint {
            background: #f5f5f5;
            border-radius: 8px;
            padding: 16px 20px;
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 24px;
        }
        .projects {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .project-card {
            background: white;
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            padding: 24px;
        }
        .project-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }
        .project-title {
            font-size: 1.1rem;
            font-weight: 500;
        }
        .status {
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 4px;
        }
        .status-paused { background: #fff8e6; color: #b8860b; }
        .status-active { background: #e6f7e6; color: #2d7d2d; }
        .status-done { background: #e6f0ff; color: #3366cc; }
        .project-info {
            font-size: 0.875rem;
            color: #666;
            margin-bottom: 8px;
        }
        .project-info strong {
            color: #333;
            font-weight: 500;
        }
        .process-section {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #f0f0f0;
        }
        .process-title {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 12px;
            font-weight: 500;
        }
        .process-item {
            font-size: 0.85rem;
            color: #555;
            margin-bottom: 12px;
            padding-left: 16px;
            border-left: 2px solid #e5e5e5;
        }
        .process-item .date {
            color: #aaa;
            font-size: 0.75rem;
        }
        .next-step {
            margin-top: 12px;
            padding: 12px 16px;
            background: #fafafa;
            border-radius: 6px;
            font-size: 0.85rem;
            color: #555;
        }
        .next-step strong { color: #333; }
        footer {
            margin-top: 60px;
            font-size: 0.8rem;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="index.html" class="back">← 返回</a>
            <h1 class="title">长期想法</h1>
            <p class="subtitle">尝试中的事，记录过程直到找到答案</p>
        </header>

        <div class="hint">
            💡 这里记录想做、尝试过一些方法、但还没达成预期效果的事。重点是「过程」——尝试了什么、效果如何、学到了什么。
        </div>

        <div class="projects">
            <div class="project-card">
                <div class="project-header">
                    <div class="project-title">🃏 心理学漫画卡片</div>
                    <span class="status status-paused">暂停</span>
                </div>
                <div class="project-info">
                    <strong>目标：</strong>把暂停实验室课程核心知识点做成扑克牌大小的卡片，可打印随身携带
                </div>

                <div class="process-section">
                    <div class="process-title">尝试记录</div>
                    
                    <div class="process-item">
                        <div class="date">2026-04-09 第一次尝试</div>
                        <div>从课程提炼25张md卡片，用 image_generate 生成图片</div>
                        <div><strong>结果：</strong>图片生成效果不满意，AI味儿太重，猫咪元素过多</div>
                        <div><strong>学到：</strong>需要更精准的prompt，或者换其他生成方案</div>
                    </div>
                </div>

                <div class="next-step">
                    <strong>下一步：</strong>调整图片风格prompt，或尝试其他图片生成工具/方案
                </div>
            </div>
        </div>

        <footer>
            <p>最后更新：2026年4月9日</p>
        </footer>
    </div>
</body>
</html>
