<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>长期想法 - bbsqq</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #fafafa;
            color: #333;
            line-height: 1.6;
            padding: 60px 24px;
        }
        .container {
            max-width: 680px;
            margin: 0 auto;
        }
        header {
            margin-bottom: 48px;
        }
        .back {
            font-size: 0.85rem;
            color: #888;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 16px;
        }
        .back:hover {
            color: #333;
        }
        .title {
            font-size: 1.75rem;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }
        .subtitle {
            font-size: 0.95rem;
            color: #666;
        }
        .projects {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .project-card {
            background: white;
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            padding: 24px;
        }
        .project-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }
        .project-title {
            font-size: 1.1rem;
            font-weight: 500;
        }
        .status {
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 4px;
            background: #f5f5f5;
            color: #666;
        }
        .status-paused {
            background: #fff8e6;
            color: #b8860b;
        }
        .status-active {
            background: #e6f7e6;
            color: #2d7d2d;
        }
        .project-info {
            font-size: 0.875rem;
            color: #666;
            margin-bottom: 8px;
        }
        .project-info strong {
            color: #333;
            font-weight: 500;
        }
        .project-note {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #f0f0f0;
            font-size: 0.875rem;
            color: #555;
        }
        .stats-summary {
            background: white;
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            padding: 16px 24px;
            margin-bottom: 24px;
            font-size: 0.875rem;
            color: #666;
        }
        .stats-summary span {
            color: #333;
            font-weight: 500;
        }
        footer {
            margin-top: 60px;
            font-size: 0.8rem;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="index.html" class="back">← 返回</a>
            <h1 class="title">长期想法</h1>
            <p class="subtitle">记录那些值得持续投入的事情</p>
        </header>

        <div class="stats-summary">
            共 <span>1</span> 个项目 · <span>0</span> 进行中 · <span>1</span> 已暂停
        </div>

        <div class="projects">
            <div class="project-card">
                <div class="project-header">
                    <div class="project-title">🃏 心理学漫画卡片</div>
                    <span class="status status-paused">暂停</span>
                </div>
                <div class="project-info">
                    <strong>进展：</strong>已提炼25张md卡片，图片生成效果不满意已删除
                </div>
                <div class="project-info">
                    <strong>位置：</strong>./暂停实验室课程/心理学漫画卡片/
                </div>
                <div class="project-note">
                    💡 下一步：调整图片风格或换其他方案
                </div>
            </div>
        </div>

        <footer>
            <p>最后更新：2026年4月9日</p>
        </footer>
    </div>
</body>
</html>
