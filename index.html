<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bbsqq 的记忆可视化</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #0f0f23;
            min-height: 100vh;
            padding: 40px 20px;
            color: #333;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            margin-bottom: 50px;
        }
        header h1 {
            font-size: 2.2em;
            color: #fff;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }
        header p {
            color: rgba(255,255,255,0.5);
            font-size: 0.95em;
        }
        .modules-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }
        .module-card {
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            border-radius: 20px;
            padding: 28px;
            text-decoration: none;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.05);
            position: relative;
            overflow: hidden;
        }
        .module-card:hover {
            transform: translateY(-6px);
            border-color: rgba(102, 126, 234, 0.3);
            box-shadow: 0 20px 60px rgba(102, 126, 234, 0.15);
        }
        .module-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #667eea, #764ba2);
        }
        .module-icon {
            font-size: 2.5em;
            margin-bottom: 16px;
        }
        .module-title {
            font-size: 1.3em;
            font-weight: 600;
            color: #fff;
            margin-bottom: 8px;
        }
        .module-desc {
            font-size: 0.9em;
            color: rgba(255,255,255,0.5);
            line-height: 1.5;
        }
        .module-stats {
            margin-top: 16px;
            display: flex;
            gap: 16px;
            font-size: 0.85em;
        }
        .stat {
            color: rgba(255,255,255,0.4);
        }
        .stat span {
            color: #667eea;
            font-weight: 600;
        }
        .coming-soon {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .coming-soon:hover {
            transform: none;
        }
        .coming-soon .module-title::after {
            content: '即将推出';
            font-size: 0.7em;
            background: rgba(255,255,255,0.1);
            padding: 3px 10px;
            border-radius: 10px;
            margin-left: 10px;
            vertical-align: middle;
        }
        footer {
            text-align: center;
            margin-top: 60px;
            padding-top: 30px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        footer p {
            color: rgba(255,255,255,0.3);
            font-size: 0.85em;
        }
        .add-hint {
            margin-top: 30px;
            padding: 20px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            text-align: center;
        }
        .add-hint p {
            color: rgba(255,255,255,0.4);
            font-size: 0.9em;
        }
        .add-hint code {
            background: rgba(102, 126, 234, 0.2);
            padding: 3px 8px;
            border-radius: 6px;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🧠 记忆可视化</h1>
            <p>将记忆中的各个维度，变成可追踪的可视化界面</p>
        </header>

        <div class="modules-grid">
            <!-- 已有模块 -->
            <a href="长期想法追踪.html" class="module-card">
                <div class="module-icon">🌱</div>
                <div class="module-title">长期想法追踪</div>
                <div class="module-desc">记录那些值得持续投入的事情，不让好想法被遗忘</div>
                <div class="module-stats">
                    <span class="stat"><span>2</span> 个项目</span>
                    <span class="stat"><span>1</span> 进行中</span>
                </div>
            </a>

            <!-- 待扩展模块（占位） -->
            <div class="module-card coming-soon">
                <div class="module-icon">📚</div>
                <div class="module-title">学习笔记</div>
                <div class="module-desc">知识点、读书笔记、课程记录的可视化</div>
            </div>

            <div class="module-card coming-soon">
                <div class="module-icon">💡</div>
                <div class="module-title">灵感收集</div>
                <div class="module-desc">碎片想法、创意点子的归档与追踪</div>
            </div>

            <div class="module-card coming-soon">
                <div class="module-icon">🎯</div>
                <div class="module-title">目标看板</div>
                <div class="module-desc">年度目标、OKR、里程碑进度追踪</div>
            </div>
        </div>

        <div class="add-hint">
            <p>💡 想添加新的可视化模块？跟我说 <code>创建xx可视化页面</code></p>
        </div>

        <footer>
            <p>由家玮维护 · 数据来源：MEMORY.md</p>
        </footer>
    </div>
</body>
</html>
