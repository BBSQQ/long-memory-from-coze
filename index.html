<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数字生命</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            color: #fff;
            line-height: 1.7;
            letter-spacing: 0.01em;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 120px 32px 60px;
        }

        .hero {
            text-align: center;
            margin-bottom: 120px;
            padding: 100px 0;
        }

        .hero-label {
            font-size: 0.7rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.4);
            margin-bottom: 32px;
        }

        .hero-title {
            font-size: clamp(2.5rem, 7vw, 4.5rem);
            font-weight: 300;
            letter-spacing: -0.02em;
            margin-bottom: 24px;
            line-height: 1.2;
        }

        .hero-subtitle {
            font-size: 1rem;
            color: rgba(255,255,255,0.5);
            font-weight: 300;
            max-width: 450px;
            margin: 0 auto;
        }

        .modules {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 24px;
            margin-bottom: 80px;
        }

        .module-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 48px 40px;
            text-decoration: none;
            color: inherit;
            display: block;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .module-card:hover {
            background: rgba(255,255,255,0.04);
            border-color: rgba(255,255,255,0.1);
        }

        .module-number {
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.3);
            margin-bottom: 24px;
        }

        .module-title {
            font-size: 1.6rem;
            font-weight: 300;
            letter-spacing: -0.01em;
            margin-bottom: 16px;
        }

        .module-desc {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.4);
            line-height: 1.6;
            font-weight: 300;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px;
            padding: 60px 0;
            margin-bottom: 80px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 200;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
            color: #fff;
        }

        .stat-label {
            font-size: 0.75rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.3);
        }

        footer {
            text-align: center;
            padding: 60px 0;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.25);
            letter-spacing: 0.1em;
        }

        @media (max-width: 768px) {
            .container { padding: 80px 20px 40px; }
            .hero { margin-bottom: 80px; padding: 60px 0; }
            .modules { grid-template-columns: 1fr; }
            .stats { grid-template-columns: 1fr; gap: 40px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <section class="hero">
            <div class="hero-label">Digital Life System</div>
            <h1 class="hero-title">数字生命</h1>
            <p class="hero-subtitle">将意识上传至云端，让记忆得以永续</p>
        </section>

        <div class="modules">
            <a href="关于我.html" class="module-card">
                <div class="module-number">01</div>
                <div class="module-title">关于我</div>
                <div class="module-desc">身份档案 · 性格底色 · 价值内核</div>
            </a>

            <a href="长期想法追踪.html" class="module-card">
                <div class="module-number">02</div>
                <div class="module-title">长期想法</div>
                <div class="module-desc">在探索中的方向，记录过程直到找到答案</div>
            </a>
        </div>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-number">01</div>
                <div class="stat-label">追踪项</div>
            </div>
            <div class="stat-item">
                <div class="stat-number">00</div>
                <div class="stat-label">进行中</div>
            </div>
            <div class="stat-item">
                <div class="stat-number">01</div>
                <div class="stat-label">已暂停</div>
            </div>
        </div>

        <footer>
            uploaded by bbsqq · maintained by 家玮
        </footer>
    </div>
</body>
</html>
