<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bbsqq 的记忆</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #fafafa;
            color: #333;
            line-height: 1.6;
            padding: 60px 24px;
        }
        .container {
            max-width: 680px;
            margin: 0 auto;
        }
        header {
            margin-bottom: 60px;
        }
        .title {
            font-size: 1.75rem;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }
        .subtitle {
            font-size: 0.95rem;
            color: #666;
        }
        .modules {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .module-link {
            display: block;
            background: white;
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            padding: 24px;
            text-decoration: none;
            color: inherit;
            transition: all 0.15s ease;
        }
        .module-link:hover {
            border-color: #999;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .module-title {
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 6px;
        }
        .module-desc {
            font-size: 0.875rem;
            color: #888;
        }
        .module-meta {
            margin-top: 12px;
            font-size: 0.8rem;
            color: #aaa;
            display: flex;
            gap: 16px;
        }
        .coming-soon {
            opacity: 0.4;
            pointer-events: none;
        }
        .coming-soon::after {
            content: 'coming soon';
            display: block;
            font-size: 0.7rem;
            color: #999;
            margin-top: 8px;
            text-transform: lowercase;
        }
        footer {
            margin-top: 80px;
            font-size: 0.8rem;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1 class="title">记忆</h1>
            <p class="subtitle">把零散的想法，变成可追踪的体系</p>
        </header>

        <div class="modules">
            <a href="长期想法追踪.html" class="module-link">
                <div class="module-title">长期想法</div>
                <div class="module-desc">那些值得持续投入的事情</div>
                <div class="module-meta">
                    <span>2 个项目</span>
                    <span>1 进行中</span>
                </div>
            </a>

            <div class="module-link coming-soon">
                <div class="module-title">学习记录</div>
                <div class="module-desc">知识点的归档与追踪</div>
            </div>

            <div class="module-link coming-soon">
                <div class="module-title">灵感收集</div>
                <div class="module-desc">碎片想法、创意点子</div>
            </div>

            <div class="module-link coming-soon">
                <div class="module-title">目标看板</div>
                <div class="module-desc">年度目标、里程碑进度</div>
            </div>
        </div>

        <footer>
            <p>by bbsqq · 维护: 家玮</p>
        </footer>
    </div>
</body>
</html>
